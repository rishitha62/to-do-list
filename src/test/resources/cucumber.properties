# ==================================================================================================
# Cucumber Configuration Properties
# Repository: https://github.com/rishitha62/to-do-list
# ==================================================================================================

# Glue (step definitions package)
cucumber.glue=com.todolist.stepdefinitions

# Features path
cucumber.features=src/test/resources/features

# Plugins
cucumber.plugin=pretty,html:target/cucumber-reports/cucumber.html,json:target/cucumber-reports/cucumber.json,junit:target/cucumber-reports/cucumber.xml

# Pretty print settings
cucumber.publish.quiet=true

# Additional options
cucumber.snippets.use-camel-case=false
cucumber.snippets.type=camelcase