<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <!-- Design Spec: Link to external CSS for styling -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- User Story 5: User-Friendly Interface - Main container with clear structure -->
    <div class="container">
        <header>
            <h1>My To-Do List</h1>
            <p class="subtitle">Stay organized and productive</p>
        </header>

        <!-- User Story 1: Add Tasks - Task Input Component (Design Spec 3.1) -->
        <div class="task-input-section">
            <input 
                type="text" 
                id="taskInput" 
                class="task-input" 
                placeholder="Enter a new task..." 
                maxlength="200"
                aria-label="New task input"
            >
            <button id="addTaskBtn" class="add-btn" aria-label="Add task">
                <span class="btn-text">Add Task</span>
                <span class="btn-icon">+</span>
            </button>
        </div>

        <!-- Task statistics and filter section -->
        <div class="task-stats">
            <div class="stat-item">
                <span class="stat-label">Total:</span>
                <span id="totalTasks" class="stat-value">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Active:</span>
                <span id="activeTasks" class="stat-value">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Completed:</span>
                <span id="completedTasks" class="stat-value">0</span>
            </div>
        </div>

        <!-- User Story 2: View Added Tasks - Task List Component (Design Spec 3.2) -->
        <div class="task-list-container">
            <ul id="taskList" class="task-list" role="list">
                <!-- User Story 3 & 4: Task Items will be dynamically rendered here -->
                <!-- Each task item will include:
                     - Checkbox for marking complete (User Story 3)
                     - Task text display (User Story 2)
                     - Delete button (User Story 4)
                     - Design Spec 3.3: Task Item Component structure
                -->
            </ul>
            <div id="emptyState" class="empty-state">
                <div class="empty-icon">📝</div>
                <p>No tasks yet. Add one above to get started!</p>
            </div>
        </div>

        <!-- Clear completed tasks button -->
        <div class="actions-footer">
            <button id="clearCompletedBtn" class="clear-btn">Clear Completed</button>
        </div>
    </div>

    <!-- User Story 7: No Backend Requirement - Client-side JavaScript only -->
    <!-- User Story 8: Immediate Effect - JavaScript handles all interactions -->
    <!-- Design Spec 3.4 & 3.5: Client State/Data Store and Interaction Controller -->
    <script src="script.js"></script>
</body>
</html>
